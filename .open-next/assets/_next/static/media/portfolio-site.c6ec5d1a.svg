  <text x="242" y="155" font-family="Arial, sans-serif" font-size="10" fill="#2dd4bf" text-anchor="middle">VALIDATE</text>
  <text x="242" y="172" font-family="Arial, sans-serif" font-size="13" font-weight="600" fill="#e2e8f0" text-anchor="middle">Zod</text>

