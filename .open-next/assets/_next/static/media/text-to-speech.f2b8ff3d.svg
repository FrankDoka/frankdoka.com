<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" width="900" height="500">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0f1e"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
    <linearGradient id="purple" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#a855f7"/>
      <stop offset="100%" stop-color="#c084fc"/>
    </linearGradient>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#475569"/>
    </marker>
    <marker id="arr2" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#7c3aed"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="900" height="500" fill="url(#bg)"/>

  <!-- Subtle dot grid -->
  <pattern id="dots" x="0" y="0" width="30" height="30" patternUnits="userSpaceOnUse">
    <circle cx="1.5" cy="1.5" r="1" fill="#ffffff" opacity="0.04"/>
  </pattern>
  <rect width="900" height="500" fill="url(#dots)"/>

  <!-- Top accent bar -->
  <rect x="0" y="0" width="900" height="3" fill="url(#purple)"/>

  <!-- Header -->
  <text x="48" y="52" font-family="ui-monospace, monospace" font-size="11" fill="#a855f7" letter-spacing="3" opacity="0.9">TEXT-TO-SPEECH SERVERLESS APP</text>
  <text x="48" y="80" font-family="Arial, sans-serif" font-size="26" font-weight="700" fill="#f1f5f9" letter-spacing="-0.5">AWS Serverless Audio Processing Pipeline</text>

  <!-- Row labels -->
  <text x="48" y="171" font-family="Arial, sans-serif" font-size="9" fill="#64748b" text-anchor="middle" transform="rotate(-90,48,166)">AUTH</text>
  <text x="48" y="275" font-family="Arial, sans-serif" font-size="9" fill="#64748b" text-anchor="middle" transform="rotate(-90,48,270)">PROCESSING</text>
  <text x="48" y="379" font-family="Arial, sans-serif" font-size="9" fill="#64748b" text-anchor="middle" transform="rotate(-90,48,374)">STORAGE</text>

  <!-- === ROW 1: Auth / Frontend === -->
  <!-- User -->
  <rect x="70" y="140" width="90" height="52" rx="8" fill="#1e293b" stroke="#334155" stroke-width="1.5"/>
  <text x="115" y="161" font-family="Arial, sans-serif" font-size="10" fill="#94a3b8" text-anchor="middle">USER</text>
  <text x="115" y="179" font-family="Arial, sans-serif" font-size="13" font-weight="600" fill="#e2e8f0" text-anchor="middle">Browser</text>

  <!-- Arrow -->
  <line x1="162" y1="166" x2="196" y2="166" stroke="#475569" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Cognito -->
  <rect x="198" y="140" width="100" height="52" rx="8" fill="#1e293b" stroke="#a855f7" stroke-width="1.5" opacity="0.85"/>
  <text x="248" y="161" font-family="Arial, sans-serif" font-size="10" fill="#c084fc" text-anchor="middle">AUTH</text>
  <text x="248" y="179" font-family="Arial, sans-serif" font-size="13" font-weight="600" fill="#e2e8f0" text-anchor="middle">Cognito</text>

  <!-- Arrow -->
  <line x1="300" y1="166" x2="334" y2="166" stroke="#475569" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Amplify -->
  <rect x="336" y="140" width="100" height="52" rx="8" fill="#1e293b" stroke="#a855f7" stroke-width="1.5" opacity="0.85"/>
  <text x="386" y="161" font-family="Arial, sans-serif" font-size="10" fill="#c084fc" text-anchor="middle">FRONTEND</text>
  <text x="386" y="179" font-family="Arial, sans-serif" font-size="13" font-weight="600" fill="#e2e8f0" text-anchor="middle">Amplify</text>

  <!-- Arrow -->
  <line x1="438" y1="166" x2="472" y2="166" stroke="#475569" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- API Gateway -->
  <rect x="474" y="140" width="108" height="52" rx="8" fill="#1e293b" stroke="#a855f7" stroke-width="2"/>
  <text x="528" y="161" font-family="Arial, sans-serif" font-size="10" fill="#c084fc" text-anchor="middle">REST API</text>
  <text x="528" y="179" font-family="Arial, sans-serif" font-size="13" font-weight="600" fill="#ffffff" text-anchor="middle">API Gateway</text>

  <!-- === ROW 2: Processing === -->
  <!-- Lambda Submit -->
  <rect x="198" y="244" width="100" height="52" rx="8" fill="#1e293b" stroke="#a855f7" stroke-width="2"/>
  <text x="248" y="265" font-family="Arial, sans-serif" font-size="10" fill="#c084fc" text-anchor="middle">SERVERLESS</text>
  <text x="248" y="283" font-family="Arial, sans-serif" font-size="13" font-weight="600" fill="#ffffff" text-anchor="middle">Lambda</text>

  <!-- Arrow API GW down to Lambda -->
  <line x1="528" y1="194" x2="528" y2="230" stroke="#475569" stroke-width="1.5"/>
  <line x1="528" y1="230" x2="300" y2="230" stroke="#475569" stroke-width="1.5"/>
  <line x1="300" y1="230" x2="300" y2="244" stroke="#475569" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Arrow Lambda → SNS -->
  <line x1="300" y1="270" x2="334" y2="270" stroke="#475569" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- SNS -->
  <rect x="336" y="244" width="100" height="52" rx="8" fill="#1e293b" stroke="#a855f7" stroke-width="1.5" opacity="0.85"/>
  <text x="386" y="265" font-family="Arial, sans-serif" font-size="10" fill="#c084fc" text-anchor="middle">MESSAGING</text>
  <text x="386" y="283" font-family="Arial, sans-serif" font-size="13" font-weight="600" fill="#e2e8f0" text-anchor="middle">SNS</text>

  <!-- Arrow SNS → Lambda Process -->
  <line x1="438" y1="270" x2="472" y2="270" stroke="#475569" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Lambda Process -->
  <rect x="474" y="244" width="108" height="52" rx="8" fill="#1e293b" stroke="#a855f7" stroke-width="2"/>
  <text x="528" y="265" font-family="Arial, sans-serif" font-size="10" fill="#c084fc" text-anchor="middle">PROCESS</text>
  <text x="528" y="283" font-family="Arial, sans-serif" font-size="13" font-weight="600" fill="#ffffff" text-anchor="middle">Lambda</text>

  <!-- === ROW 3: Storage/Services === -->
  <!-- Translate -->
  <rect x="198" y="348" width="100" height="52" rx="8" fill="#1e293b" stroke="#7c3aed" stroke-width="1.5"/>
  <text x="248" y="369" font-family="Arial, sans-serif" font-size="10" fill="#a78bfa" text-anchor="middle">AI SERVICE</text>
  <text x="248" y="387" font-family="Arial, sans-serif" font-size="13" font-weight="600" fill="#e2e8f0" text-anchor="middle">Translate</text>

  <!-- Arrow Lambda Process → Translate -->
  <line x1="528" y1="298" x2="528" y2="334" stroke="#475569" stroke-width="1.5"/>
  <line x1="528" y1="334" x2="300" y2="334" stroke="#475569" stroke-width="1.5"/>
  <line x1="300" y1="334" x2="300" y2="348" stroke="#475569" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Arrow Translate → Polly -->
  <line x1="300" y1="374" x2="334" y2="374" stroke="#475569" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Polly -->
  <rect x="336" y="348" width="100" height="52" rx="8" fill="#1e293b" stroke="#7c3aed" stroke-width="1.5"/>
  <text x="386" y="369" font-family="Arial, sans-serif" font-size="10" fill="#a78bfa" text-anchor="middle">TTS</text>
  <text x="386" y="387" font-family="Arial, sans-serif" font-size="13" font-weight="600" fill="#e2e8f0" text-anchor="middle">Polly</text>

  <!-- Arrow Polly → S3 -->
  <line x1="438" y1="374" x2="472" y2="374" stroke="#475569" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- S3 -->
  <rect x="474" y="348" width="100" height="52" rx="8" fill="#1e293b" stroke="#7c3aed" stroke-width="2"/>
  <text x="524" y="369" font-family="Arial, sans-serif" font-size="10" fill="#a78bfa" text-anchor="middle">AUDIO STORE</text>
  <text x="524" y="387" font-family="Arial, sans-serif" font-size="13" font-weight="600" fill="#ffffff" text-anchor="middle">S3 Bucket</text>

  <!-- DynamoDB also stored (to the right of S3) — connected from Lambda Submit -->
  <line x1="248" y1="298" x2="248" y2="320" stroke="#475569" stroke-width="1.5"/>
  <line x1="248" y1="320" x2="590" y2="320" stroke="#475569" stroke-width="1.5"/>
  <line x1="590" y1="320" x2="590" y2="244" stroke="#475569" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- DynamoDB box -->
  <rect x="596" y="244" width="100" height="52" rx="8" fill="#1e293b" stroke="#7c3aed" stroke-width="2"/>
  <text x="646" y="265" font-family="Arial, sans-serif" font-size="10" fill="#a78bfa" text-anchor="middle">NoSQL DB</text>
  <text x="646" y="283" font-family="Arial, sans-serif" font-size="13" font-weight="600" fill="#ffffff" text-anchor="middle">DynamoDB</text>

  <!-- Right-side tech stack -->
  <rect x="718" y="140" width="154" height="260" rx="12" fill="#0f172a" stroke="#1e293b" stroke-width="1.5"/>
  <text x="795" y="165" font-family="Arial, sans-serif" font-size="11" font-weight="700" fill="#94a3b8" text-anchor="middle" letter-spacing="1">TECH STACK</text>
  <line x1="733" y1="174" x2="857" y2="174" stroke="#1e293b" stroke-width="1"/>
  <text x="733" y="197" font-family="Arial, sans-serif" font-size="11" fill="#e2e8f0">☁  AWS Lambda</text>
  <text x="733" y="220" font-family="Arial, sans-serif" font-size="11" fill="#e2e8f0">🔐  Cognito Auth</text>
  <text x="733" y="243" font-family="Arial, sans-serif" font-size="11" fill="#e2e8f0">🗣  Amazon Polly</text>
  <text x="733" y="266" font-family="Arial, sans-serif" font-size="11" fill="#e2e8f0">🌐  Amazon Translate</text>
  <text x="733" y="289" font-family="Arial, sans-serif" font-size="11" fill="#e2e8f0">📦  S3 Audio Store</text>
  <text x="733" y="312" font-family="Arial, sans-serif" font-size="11" fill="#e2e8f0">🗄  DynamoDB</text>
  <text x="733" y="335" font-family="Arial, sans-serif" font-size="11" fill="#e2e8f0">🔔  SNS Triggers</text>
  <text x="733" y="358" font-family="Arial, sans-serif" font-size="11" fill="#e2e8f0">⚙  Terraform IaC</text>

  <!-- Footer -->
  <text x="48" y="472" font-family="ui-monospace, monospace" font-size="10" fill="#334155">frankdoka.com/projects/text-to-speech</text>
</svg>
