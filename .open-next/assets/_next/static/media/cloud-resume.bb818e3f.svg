<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" width="900" height="500">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0f1e"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
    <linearGradient id="orange" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#f97316"/>
      <stop offset="100%" stop-color="#fb923c"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="900" height="500" fill="url(#bg)"/>

  <!-- Subtle dot grid -->
  <pattern id="dots" x="0" y="0" width="30" height="30" patternUnits="userSpaceOnUse">
    <circle cx="1.5" cy="1.5" r="1" fill="#ffffff" opacity="0.04"/>
  </pattern>
  <rect width="900" height="500" fill="url(#dots)"/>

  <!-- Top accent bar -->
  <rect x="0" y="0" width="900" height="3" fill="url(#orange)"/>

  <!-- Header label -->
  <text x="48" y="52" font-family="ui-monospace, monospace" font-size="11" fill="#f97316" letter-spacing="3" opacity="0.9">CLOUD RESUME CHALLENGE</text>
  <text x="48" y="80" font-family="Arial, sans-serif" font-size="26" font-weight="700" fill="#f1f5f9" letter-spacing="-0.5">AWS Full-Stack Serverless Architecture</text>

  <!-- === ROW 1: Frontend path === -->
  <!-- User -->
  <rect x="48" y="140" width="100" height="52" rx="8" fill="#1e293b" stroke="#334155" stroke-width="1.5"/>
  <text x="98" y="161" font-family="Arial, sans-serif" font-size="10" fill="#94a3b8" text-anchor="middle">USER</text>
  <text x="98" y="179" font-family="Arial, sans-serif" font-size="13" font-weight="600" fill="#e2e8f0" text-anchor="middle">Browser</text>

  <!-- Arrow -->
  <line x1="150" y1="166" x2="192" y2="166" stroke="#475569" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Route 53 -->
  <rect x="194" y="140" width="100" height="52" rx="8" fill="#1e293b" stroke="#f97316" stroke-width="1.5" opacity="0.8"/>
  <text x="244" y="161" font-family="Arial, sans-serif" font-size="10" fill="#fb923c" text-anchor="middle">DNS</text>
  <text x="244" y="179" font-family="Arial, sans-serif" font-size="13" font-weight="600" fill="#e2e8f0" text-anchor="middle">Route 53</text>

  <!-- Arrow -->
  <line x1="296" y1="166" x2="338" y2="166" stroke="#475569" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- CloudFront -->
  <rect x="340" y="140" width="108" height="52" rx="8" fill="#1e293b" stroke="#f97316" stroke-width="1.5" opacity="0.8"/>
  <text x="394" y="161" font-family="Arial, sans-serif" font-size="10" fill="#fb923c" text-anchor="middle">CDN / HTTPS</text>
  <text x="394" y="179" font-family="Arial, sans-serif" font-size="13" font-weight="600" fill="#e2e8f0" text-anchor="middle">CloudFront</text>

  <!-- Arrow -->
  <line x1="450" y1="166" x2="492" y2="166" stroke="#475569" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- S3 -->
  <rect x="494" y="140" width="100" height="52" rx="8" fill="#1e293b" stroke="#f97316" stroke-width="2"/>
  <text x="544" y="161" font-family="Arial, sans-serif" font-size="10" fill="#fb923c" text-anchor="middle">STATIC SITE</text>
  <text x="544" y="179" font-family="Arial, sans-serif" font-size="13" font-weight="600" fill="#ffffff" text-anchor="middle">S3 Bucket</text>

  <!-- === ROW 2: Backend path (offset down) === -->
  <!-- API Gateway -->
  <rect x="194" y="244" width="108" height="52" rx="8" fill="#1e293b" stroke="#f97316" stroke-width="1.5" opacity="0.8"/>
  <text x="248" y="265" font-family="Arial, sans-serif" font-size="10" fill="#fb923c" text-anchor="middle">REST API</text>
  <text x="248" y="283" font-family="Arial, sans-serif" font-size="13" font-weight="600" fill="#e2e8f0" text-anchor="middle">API Gateway</text>

  <!-- Arrow from Browser down to API GW -->
  <line x1="98" y1="194" x2="98" y2="270" stroke="#475569" stroke-width="1.5"/>
  <line x1="98" y1="270" x2="192" y2="270" stroke="#475569" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Arrow API GW → Lambda -->
  <line x1="304" y1="270" x2="346" y2="270" stroke="#475569" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Lambda -->
  <rect x="348" y="244" width="100" height="52" rx="8" fill="#1e293b" stroke="#f97316" stroke-width="2"/>
  <text x="398" y="265" font-family="Arial, sans-serif" font-size="10" fill="#fb923c" text-anchor="middle">SERVERLESS</text>
  <text x="398" y="283" font-family="Arial, sans-serif" font-size="13" font-weight="600" fill="#ffffff" text-anchor="middle">Lambda</text>

  <!-- Arrow Lambda → DynamoDB -->
  <line x1="450" y1="270" x2="492" y2="270" stroke="#475569" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- DynamoDB -->
  <rect x="494" y="244" width="100" height="52" rx="8" fill="#1e293b" stroke="#f97316" stroke-width="2"/>
  <text x="544" y="265" font-family="Arial, sans-serif" font-size="10" fill="#fb923c" text-anchor="middle">NoSQL DB</text>
  <text x="544" y="283" font-family="Arial, sans-serif" font-size="13" font-weight="600" fill="#ffffff" text-anchor="middle">DynamoDB</text>

  <!-- === ROW 3: CI/CD === -->
  <!-- GitHub -->
  <rect x="194" y="348" width="100" height="52" rx="8" fill="#1e293b" stroke="#6366f1" stroke-width="1.5"/>
  <text x="244" y="369" font-family="Arial, sans-serif" font-size="10" fill="#818cf8" text-anchor="middle">SOURCE</text>
  <text x="244" y="387" font-family="Arial, sans-serif" font-size="13" font-weight="600" fill="#e2e8f0" text-anchor="middle">GitHub</text>

  <!-- Arrow -->
  <line x1="296" y1="374" x2="338" y2="374" stroke="#475569" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- GitHub Actions -->
  <rect x="340" y="348" width="108" height="52" rx="8" fill="#1e293b" stroke="#6366f1" stroke-width="1.5"/>
  <text x="394" y="369" font-family="Arial, sans-serif" font-size="10" fill="#818cf8" text-anchor="middle">CI/CD</text>
  <text x="394" y="387" font-family="Arial, sans-serif" font-size="13" font-weight="600" fill="#e2e8f0" text-anchor="middle">GH Actions</text>

  <!-- Arrow -->
  <line x1="450" y1="374" x2="492" y2="374" stroke="#475569" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Terraform -->
  <rect x="494" y="348" width="100" height="52" rx="8" fill="#1e293b" stroke="#6366f1" stroke-width="1.5"/>
  <text x="544" y="369" font-family="Arial, sans-serif" font-size="10" fill="#818cf8" text-anchor="middle">IaC</text>
  <text x="544" y="387" font-family="Arial, sans-serif" font-size="13" font-weight="600" fill="#e2e8f0" text-anchor="middle">Terraform</text>

  <!-- Row labels -->
  <text x="48" y="171" font-family="Arial, sans-serif" font-size="9" fill="#64748b" text-anchor="middle" transform="rotate(-90,48,166)">FRONTEND</text>
  <text x="48" y="275" font-family="Arial, sans-serif" font-size="9" fill="#64748b" text-anchor="middle" transform="rotate(-90,48,270)">BACKEND</text>
  <text x="48" y="379" font-family="Arial, sans-serif" font-size="9" fill="#64748b" text-anchor="middle" transform="rotate(-90,48,374)">CI / CD</text>

  <!-- Right-side tech stack -->
  <rect x="660" y="140" width="200" height="260" rx="12" fill="#0f172a" stroke="#1e293b" stroke-width="1.5"/>
  <text x="760" y="165" font-family="Arial, sans-serif" font-size="11" font-weight="700" fill="#94a3b8" text-anchor="middle" letter-spacing="1">TECH STACK</text>
  <line x1="680" y1="174" x2="840" y2="174" stroke="#1e293b" stroke-width="1"/>
  <text x="680" y="197" font-family="Arial, sans-serif" font-size="12" fill="#e2e8f0">☁  AWS S3 + CloudFront</text>
  <text x="680" y="222" font-family="Arial, sans-serif" font-size="12" fill="#e2e8f0">⚡  Lambda (Python)</text>
  <text x="680" y="247" font-family="Arial, sans-serif" font-size="12" fill="#e2e8f0">🗄  DynamoDB</text>
  <text x="680" y="272" font-family="Arial, sans-serif" font-size="12" fill="#e2e8f0">🔗  API Gateway</text>
  <text x="680" y="297" font-family="Arial, sans-serif" font-size="12" fill="#e2e8f0">🌐  Route 53 + ACM</text>
  <text x="680" y="322" font-family="Arial, sans-serif" font-size="12" fill="#e2e8f0">⚙  Terraform</text>
  <text x="680" y="347" font-family="Arial, sans-serif" font-size="12" fill="#e2e8f0">🚀  GitHub Actions</text>
  <text x="680" y="372" font-family="Arial, sans-serif" font-size="12" fill="#e2e8f0">✅  Cypress Tests</text>

  <!-- Arrow marker -->
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#475569"/>
    </marker>
  </defs>

  <!-- Footer -->
  <text x="48" y="472" font-family="ui-monospace, monospace" font-size="10" fill="#334155">frankdoka.com/projects/cloud-resume-challenge</text>
</svg>
